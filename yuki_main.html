<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuki 集點卡 - Firebase 版</title>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Arial", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #fff5f7 0%, #fffbf0 100%);
            color: #333;
            min-height: 100vh;
        }

        .page-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
            padding: 2rem;
            background: linear-gradient(135deg, #ffb3d9 0%, #ffc9e3 100%);
            border-radius: 25px;
            color: #6b2d5c;
            box-shadow: 0 8px 25px rgba(255, 179, 217, 0.3);
        }

        .title {
            font-size: 52px;
            font-weight: bold;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.5);
        }

        .admin-link {
            padding: 15px 30px;
            border: 3px solid rgba(255, 255, 255, 0.6);
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.3);
            color: #6b2d5c;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            margin-top: 1rem;
        }

        .admin-link:hover {
            background: rgba(255, 255, 255, 0.6);
            transform: scale(1.05);
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            border-radius: 25px;
            padding: 2rem;
            box-shadow: 0 8px 25px rgba(255, 179, 217, 0.2);
        }

        .card-points {
            background: linear-gradient(135deg, #ffc9e3 0%, #ffb3d9 100%);
            color: #6b2d5c;
            grid-column: span 2;
        }

        .card-input {
            background: linear-gradient(135deg, #ffe3f0 0%, #ffd4e7 100%);
            color: #6b2d5c;
        }

        .card-rewards {
            background: linear-gradient(135deg, #fff0f6 0%, #ffe8f2 100%);
            color: #6b2d5c;
        }

        .card-history {
            background: linear-gradient(135deg, #fff0f6 0%, #ffe8f2 100%);
            color: #6b2d5c;
        }

        .card-redeemed {
            background: linear-gradient(135deg, #ffe3f0 0%, #ffd4e7 100%);
            color: #6b2d5c;
        }

        .card-stats {
            background: linear-gradient(135deg, #ffb3d9 0%, #ffc9e3 100%);
            color: #6b2d5c;
        }

        @media (max-width: 1024px) {
            .card-points {
                grid-column: auto;
            }
        }

        .section-title {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 1.5rem;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.6);
        }

        .points-display {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            margin-bottom: 1.5rem;
            border: 4px dashed rgba(255, 255, 255, 0.5);
        }

        .points-label {
            font-size: 32px;
            margin-bottom: 1rem;
            font-weight: bold;
        }

        .points-number {
            font-size: 100px;
            font-weight: bold;
            line-height: 1;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.5);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 0.8rem;
            text-shadow: 1px 1px 1px rgba(255, 255, 255, 0.3);
        }

        input, textarea, select {
            width: 100%;
            padding: 15px;
            border: 3px solid rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            font-size: 18px;
            font-family: Arial, sans-serif;
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            box-sizing: border-box;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 1);
            background: white;
            box-shadow: 0 0 10px rgba(255, 179, 217, 0.4);
        }

        textarea {
            resize: vertical;
            min-height: 60px;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 1.5rem;
        }

        button {
            flex: 1;
            padding: 18px;
            border: 3px solid rgba(255, 255, 255, 0.5);
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.2);
            color: #6b2d5c;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-shadow: 1px 1px 1px rgba(255, 255, 255, 0.3);
        }

        button:hover {
            background: rgba(255, 255, 255, 0.5);
            border-color: white;
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.98);
        }

        .history-item {
            background: rgba(255, 255, 255, 0.3);
            border-left: 6px solid #ffb3d9;
            border-radius: 12px;
            padding: 1.2rem;
            margin-bottom: 1rem;
            font-size: 18px;
        }

        .history-item.negative {
            border-left-color: #ff9cc6;
        }

        .history-points {
            font-weight: bold;
            font-size: 28px;
            margin-bottom: 0.5rem;
        }

        .history-points.positive {
            color: #d73d8c;
        }

        .history-points.negative {
            color: #e85fa1;
        }

        .history-reason {
            font-size: 18px;
            margin-bottom: 0.3rem;
            font-weight: 500;
        }

        .history-meta {
            font-size: 14px;
            opacity: 0.8;
        }

        .rewards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .reward-card {
            background: rgba(255, 255, 255, 0.4);
            border: 4px solid rgba(255, 255, 255, 0.6);
            border-radius: 20px;
            padding: 1.2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
        }

        .reward-card:hover {
            transform: scale(1.08);
            background: rgba(255, 255, 255, 0.7);
            border-color: rgba(255, 255, 255, 1);
            box-shadow: 0 6px 20px rgba(255, 179, 217, 0.3);
        }

        .reward-emoji {
            font-size: 50px;
            margin-bottom: 0.8rem;
        }

        .reward-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 0.5rem;
            word-break: break-word;
        }

        .reward-cost {
            font-size: 16px;
            margin-bottom: 0.8rem;
            font-weight: bold;
        }

        .reward-button {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 3px solid rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.2);
            color: inherit;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .reward-button:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.5);
            border-color: white;
            transform: scale(1.05);
        }

        .reward-button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .scroll-container {
            max-height: 400px;
            overflow-y: auto;
            padding-right: 12px;
        }

        .empty-message {
            text-align: center;
            padding: 2rem;
            font-size: 20px;
            opacity: 0.7;
            font-weight: 500;
        }

        .success-message {
            background: rgba(255, 255, 255, 0.4);
            border: 3px solid rgba(255, 255, 255, 0.8);
            border-radius: 15px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            color: #d73d8c;
        }

        .error-message {
            background: rgba(255, 192, 203, 0.3);
            border: 3px solid rgba(255, 179, 217, 0.8);
            border-radius: 15px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            color: #d73d8c;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            padding: 1.5rem;
            text-align: center;
            border: 3px dashed rgba(255, 255, 255, 0.5);
        }

        .stat-label {
            font-size: 18px;
            margin-bottom: 0.5rem;
            font-weight: bold;
            opacity: 0.95;
        }

        .stat-value {
            font-size: 42px;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.5);
        }

        .redeemed-item {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 18px;
        }

        .redeemed-emoji {
            font-size: 40px;
        }

        .redeemed-info {
            flex: 1;
        }

        .redeemed-name {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 0.25rem;
        }

        .redeemed-date {
            font-size: 14px;
            opacity: 0.8;
        }

        .stats-detail {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 2px dashed rgba(255, 255, 255, 0.4);
            font-size: 18px;
            line-height: 1.8;
        }

        .stats-detail-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 0.75rem 0;
        }

        .stats-detail-label {
            font-weight: bold;
        }

        .stats-detail-value {
            font-size: 22px;
            font-weight: bold;
        }

        .hidden-input {
            display: none;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            font-size: 18px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <div class="header">
            <h1 class="title">🎯 Yuki 集點卡</h1>
            <a href="yuki_admin.html" class="admin-link">⚙️ 管理後台</a>
        </div>

        <div class="main-grid">
            <div class="card card-points">
                <div class="points-display">
                    <div class="points-label">🌟 目前點數 🌟</div>
                    <div class="points-number" id="totalPoints">0</div>
                </div>
            </div>
        </div>

        <div class="main-grid">
            <div class="card card-input">
                <h3 class="section-title">➕ 新增/扣減點數</h3>

                <div id="message"></div>

                <div class="form-group">
                    <label class="form-label">點數 (+/-)：</label>
                    <input type="number" id="pointsInput" placeholder="輸入正數(加點)或負數(扣點)" value="0">
                </div>

                <div class="form-group">
                    <label class="form-label">原因：</label>
                    <select id="reasonSelect">
                        <option value="">--請選擇--</option>
                        <option value="other">其他</option>
                    </select>
                </div>

                <div class="form-group hidden-input" id="otherReasonGroup">
                    <label class="form-label">其他原因：</label>
                    <input type="text" id="otherReasonInput" placeholder="請輸入原因">
                </div>

                <div class="form-group">
                    <label class="form-label">備注 (可選)：</label>
                    <textarea id="noteInput" placeholder="補充說明，例如：Yuki 主動幫忙打掃房間"></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">加減點的人：</label>
                    <select id="evaluatorInput">
                        <option value="">--請選擇--</option>
                        <option value="爸爸">👨 爸爸</option>
                        <option value="媽媽">👩 媽媽</option>
                        <option value="其他">其他</option>
                    </select>
                </div>

                <div class="form-group hidden-input" id="otherEvaluatorGroup">
                    <label class="form-label">其他人名稱：</label>
                    <input type="text" id="otherEvaluatorInput" placeholder="請輸入名稱">
                </div>

                <div class="button-group">
                    <button onclick="addPoints()">✓ 確認</button>
                    <button onclick="clearForm()">清除</button>
                </div>

                <div class="stats-grid" id="topStatsContainer">
                    <div class="loading">載入中...</div>
                </div>
            </div>

            <div class="card card-rewards">
                <h3 class="section-title">🎁 獎品兌換</h3>
                <div class="rewards-grid" id="rewardsList">
                    <div class="empty-message" style="grid-column: 1/-1;">載入中...</div>
                </div>
            </div>
        </div>

        <div class="main-grid">
            <div class="card card-history">
                <h3 class="section-title">📊 加減點記錄</h3>
                <div class="scroll-container" id="historyList">
                    <div class="empty-message">載入中...</div>
                </div>
            </div>

            <div class="card card-redeemed">
                <h3 class="section-title">🏆 已兌換獎品</h3>
                <div class="scroll-container" id="redeemList">
                    <div class="empty-message">載入中...</div>
                </div>
            </div>
        </div>

        <div class="card card-stats">
            <h3 class="section-title">📈 統計資訊</h3>
            <div id="statsContent">
                <div class="empty-message">載入中...</div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD4UcxdSJFA3Jp0qgLjvIO7E-TvogyDNig",
            authDomain: "point-system-52eac.firebaseapp.com",
            databaseURL: "https://point-system-52eac-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "point-system-52eac",
            storageBucket: "point-system-52eac.firebasestorage.app",
            messagingSenderId: "1071484950223",
            appId: "1:1071484950223:web:a0d166e7069b4e5a1d09ba"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let totalPoints = 0;
        let history = [];
        let redeemHistory = [];
        let rewards = {};
        let reasons = {};

        function init() {
            loadRewards();
            loadReasons();
            loadPointsData();
        }

        function loadRewards() {
            db.ref('yukiRewards').on('value', snapshot => {
                rewards = snapshot.val() || {};
                updateDisplay();
            });
        }

        function loadReasons() {
            db.ref('yukiReasons').on('value', snapshot => {
                reasons = snapshot.val() || {};
                updateReasonSelect();
            });
        }

        function loadPointsData() {
            db.ref('yukiPoints').on('value', snapshot => {
                const data = snapshot.val() || {};
                totalPoints = data.points || 0;
                history = Object.values(data.history || {});
                redeemHistory = Object.values(data.redeemed || {});
                updateDisplay();
            });
        }

        function updateReasonSelect() {
            const select = document.getElementById('reasonSelect');
            select.innerHTML = '<option value="">--請選擇--</option>';

            Object.values(reasons).forEach(reason => {
                select.innerHTML += `<option value="${reason.name}">${reason.name}</option>`;
            });

            select.innerHTML += '<option value="other">其他</option>';
        }

        function addPoints() {
            const points = parseInt(document.getElementById('pointsInput').value, 10);
            const reasonSelect = document.getElementById('reasonSelect').value;
            const note = document.getElementById('noteInput').value.trim();
            const evaluator = document.getElementById('evaluatorInput').value;

            if (isNaN(points) || !reasonSelect || !evaluator) {
                showMessage('請填寫所有必填欄位', 'error');
                return;
            }

            let reason = reasonSelect;
            if (reasonSelect === 'other') {
                reason = document.getElementById('otherReasonInput').value.trim();
                if (!reason) {
                    showMessage('請輸入其他原因', 'error');
                    return;
                }
            }

            let finalEvaluator = evaluator;
            if (evaluator === '其他') {
                finalEvaluator = document.getElementById('otherEvaluatorInput').value.trim();
                if (!finalEvaluator) {
                    showMessage('請輸入其他人的名稱', 'error');
                    return;
                }
            }

            const pointData = {
                points: points,
                reason: reason,
                note: note || null,
                evaluator: finalEvaluator,
                date: new Date().toLocaleString('zh-Hant-TW')
            };

            db.ref('yukiPoints').transaction(current => {
                const data = current || { points: 0, history: {}, redeemed: {} };
                data.points = (data.points || 0) + points;

                const historyKey = db.ref('yukiPoints/history').push().key;
                data.history = data.history || {};
                data.history[historyKey] = pointData;

                return data;
            }).then(() => {
                clearForm();
                showMessage(`成功！已${points > 0 ? '加' : '扣'}${Math.abs(points)}點`, 'success');
            }).catch(error => {
                showMessage(`同步失敗：${error.message}`, 'error');
            });
        }

        function redeemReward(rewardId) {
            const reward = Object.values(rewards)[rewardId];

            if (!reward) {
                showMessage('找不到獎品', 'error');
                return;
            }

            if (totalPoints < reward.cost) {
                showMessage(`點數不足！還差 ${reward.cost - totalPoints} 點`, 'error');
                return;
            }

            db.ref('yukiPoints').transaction(current => {
                const data = current || { points: 0, history: {}, redeemed: {} };
                data.points = (data.points || 0) - reward.cost;

                const redeemedKey = db.ref('yukiPoints/redeemed').push().key;
                data.redeemed = data.redeemed || {};
                data.redeemed[redeemedKey] = {
                    name: reward.name,
                    cost: reward.cost,
                    date: new Date().toLocaleString('zh-Hant-TW')
                };

                return data;
            }).then(() => {
                showMessage(`恭喜！已兌換「${reward.name}」`, 'success');
            }).catch(error => {
                showMessage(`同步失敗：${error.message}`, 'error');
            });
        }

        function calculateStats() {
            const positiveHistory = history.filter(h => h.points > 0);
            const negativeHistory = history.filter(h => h.points < 0);

            const reasonCount = {};
            positiveHistory.forEach(item => {
                reasonCount[item.reason] = (reasonCount[item.reason] || 0) + 1;
            });
            const topReason = Object.entries(reasonCount).sort((a, b) => b[1] - a[1])[0];

            const badReasonCount = {};
            negativeHistory.forEach(item => {
                badReasonCount[item.reason] = (badReasonCount[item.reason] || 0) + 1;
            });
            const topBadReason = Object.entries(badReasonCount).sort((a, b) => b[1] - a[1])[0];

            const redeemCount = redeemHistory.length;
            const totalSpent = redeemHistory.reduce((sum, item) => sum + (item.cost || 0), 0);

            return {
                addCount: positiveHistory.length,
                minusCount: negativeHistory.length,
                topReason: topReason ? topReason[0] : '---',
                topReasonCount: topReason ? topReason[1] : 0,
                topBadReason: topBadReason ? topBadReason[0] : '---',
                topBadReasonCount: topBadReason ? topBadReason[1] : 0,
                redeemCount,
                totalSpent
            };
        }

        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            const className = type === 'success' ? 'success-message' : 'error-message';
            messageEl.innerHTML = `<div class="${className}">${text}</div>`;

            setTimeout(() => {
                messageEl.innerHTML = '';
            }, 3000);
        }

        function clearForm() {
            document.getElementById('pointsInput').value = '0';
            document.getElementById('reasonSelect').value = '';
            document.getElementById('otherReasonInput').value = '';
            document.getElementById('noteInput').value = '';
            document.getElementById('evaluatorInput').value = '';
            document.getElementById('otherEvaluatorInput').value = '';
            document.getElementById('otherReasonGroup').classList.add('hidden-input');
            document.getElementById('otherEvaluatorGroup').classList.add('hidden-input');
        }

        function updateDisplay() {
            document.getElementById('totalPoints').textContent = totalPoints;

            const rewardArray = Object.values(rewards);
            const rewardsList = document.getElementById('rewardsList');
            if (rewardArray.length === 0) {
                rewardsList.innerHTML = '<div class="empty-message" style="grid-column: 1/-1;">還沒有獎品</div>';
            } else {
                rewardsList.innerHTML = rewardArray.map((reward, idx) => `
                    <div class="reward-card">
                        <div class="reward-emoji">${reward.emoji || '🎁'}</div>
                        <div class="reward-name">${reward.name}</div>
                        <div class="reward-cost">${reward.cost} 點</div>
                        <button class="reward-button" onclick="redeemReward(${idx})" ${totalPoints < reward.cost ? 'disabled' : ''}>
                            兌換
                        </button>
                    </div>
                `).join('');
            }

            const historyList = document.getElementById('historyList');
            if (history.length === 0) {
                historyList.innerHTML = '<div class="empty-message">還沒有記錄</div>';
            } else {
                historyList.innerHTML = history.slice(-15).reverse().map(item => `
                    <div class="history-item ${item.points < 0 ? 'negative' : ''}">
                        <div class="history-points ${item.points > 0 ? 'positive' : 'negative'}">
                            ${item.points > 0 ? '➕' : '➖'} ${Math.abs(item.points)} 點
                        </div>
                        <div class="history-reason">${item.reason}</div>
                        ${item.note ? `<div class="history-meta">備注：${item.note}</div>` : ''}
                        <div class="history-meta">👤 ${item.evaluator} | ${item.date}</div>
                    </div>
                `).join('');
            }

            const redeemList = document.getElementById('redeemList');
            if (redeemHistory.length === 0) {
                redeemList.innerHTML = '<div class="empty-message">還沒有兌換過獎品</div>';
            } else {
                redeemList.innerHTML = redeemHistory.slice(-15).reverse().map(item => `
                    <div class="redeemed-item">
                        <div class="redeemed-emoji">🎁</div>
                        <div class="redeemed-info">
                            <div class="redeemed-name">${item.name}</div>
                            <div class="redeemed-date">用了 ${item.cost} 點 | ${item.date}</div>
                        </div>
                    </div>
                `).join('');
            }

            const stats = calculateStats();

            const statsContent = document.getElementById('statsContent');
            statsContent.innerHTML = `
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-label">📝 加分次數</div>
                        <div class="stat-value">${stats.addCount}</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">⚠️ 扣分次數</div>
                        <div class="stat-value">${stats.minusCount}</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">🏆 已兌換獎品</div>
                        <div class="stat-value">${stats.redeemCount}</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">💰 花費點數</div>
                        <div class="stat-value">${stats.totalSpent}</div>
                    </div>
                </div>
                <div class="stats-detail">
                    <div class="stats-detail-item">
                        <span class="stats-detail-label">🌟 最常加分原因：</span>
                        <span class="stats-detail-value">${stats.topReason}</span>
                    </div>
                    <div class="stats-detail-item" style="font-size: 14px; opacity: 0.8;">
                        (出現 ${stats.topReasonCount} 次)
                    </div>
                    <div class="stats-detail-item">
                        <span class="stats-detail-label">❌ 最常扣分原因：</span>
                        <span class="stats-detail-value">${stats.topBadReason}</span>
                    </div>
                    <div class="stats-detail-item" style="font-size: 14px; opacity: 0.8;">
                        (出現 ${stats.topBadReasonCount} 次)
                    </div>
                </div>
            `;

            const topStatsContainer = document.getElementById('topStatsContainer');
            topStatsContainer.innerHTML = `
                <div class="stat-item">
                    <div class="stat-label">加分次數</div>
                    <div class="stat-value">${stats.addCount}</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">扣分次數</div>
                    <div class="stat-value">${stats.minusCount}</div>
                </div>
            `;
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('reasonSelect').addEventListener('change', function() {
                const otherGroup = document.getElementById('otherReasonGroup');
                if (this.value === 'other') {
                    otherGroup.classList.remove('hidden-input');
                } else {
                    otherGroup.classList.add('hidden-input');
                }
            });

            document.getElementById('evaluatorInput').addEventListener('change', function() {
                const otherGroup = document.getElementById('otherEvaluatorGroup');
                if (this.value === '其他') {
                    otherGroup.classList.remove('hidden-input');
                } else {
                    otherGroup.classList.add('hidden-input');
                }
            });

            init();
        });
    </script>
</body>
</html>
